<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencarian Buku Semantik</title>
    <!-- Menggunakan Bootstrap 5 untuk styling -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts untuk tampilan teks yang lebih baik -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- General Styling & Color Palette --- */
      :root {
        --primary-color: #0056b3;
        --secondary-color: #6c757d;
        --background-start: #e9ecef;
        --background-end: #dee2e6;
        --card-bg: #ffffff;
        --text-color: #212529;
        --text-muted-color: #6c757d;
        --accent-color: #007bff;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--background-start);
        background-image: linear-gradient(
          180deg,
          var(--background-start) 0%,
          var(--background-end) 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
      }

      .container {
        max-width: 700px;
      }

      /* --- Main Search Card --- */
      .search-card {
        background-color: var(--card-bg);
        border: 1px solid #dee2e6;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        padding: 2.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 0.6s ease-out forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .search-card h1 {
        font-family: "Playfair Display", serif;
        color: var(--text-color);
        margin-bottom: 0.5rem;
      }

      .search-card .subtitle {
        font-size: 1.1rem;
        color: var(--text-muted-color);
        margin-bottom: 2rem;
      }

      /* --- Form Elements Styling --- */
      .form-label strong {
        font-weight: 500;
        font-size: 1rem;
      }

      .form-control {
        border-radius: 8px;
        border: 1px solid #ced4da;
        padding: 0.75rem 1rem;
      }
      .form-control:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
      }

      .form-text code {
        background-color: #e9ecef;
        padding: 0.2em 0.4em;
        border-radius: 3px;
        font-size: 0.9em;
      }

      /* --- Custom Radio Buttons --- */
      .model-options .form-check {
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 0.75rem 1.25rem;
        margin-bottom: 0.75rem;
        transition: all 0.2s ease-in-out;
      }

      .model-options .form-check:hover {
        border-color: var(--accent-color);
        background-color: #e9f2ff;
      }

      .model-options .form-check-input {
        margin-top: 0.2em;
      }

      .model-options .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }

      .model-options .form-check-label {
        width: 100%;
        cursor: pointer;
      }

      /* --- Submit Button --- */
      .btn-submit {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        font-weight: 700;
        padding: 0.75rem;
        border-radius: 8px;
        transition: background-color 0.2s ease;
      }

      .btn-submit:hover {
        background-color: #004494; /* Warna biru lebih gelap saat hover */
        border-color: #004494;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="search-card">
        <h1 class="text-center">Pencarian Buku Semantik</h1>
        <p class="text-center subtitle">
          Implementasi SBERT vs TF-IDF vs Exact Match
        </p>

        <form action="/search" method="post">
          <div class="mb-4">
            <label for="query" class="form-label"
              ><strong>Masukkan Query Pencarian</strong></label
            >
            <textarea
              class="form-control"
              id="query"
              name="query"
              rows="3"
              placeholder="Contoh: buku tentang perjalanan waktu AND paradoks"
            ></textarea>
            <div class="form-text mt-2">
              Gunakan operator <code>AND</code> atau <code>OR</code> (huruf
              kapital) untuk pencarian boolean.
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label"
              ><strong>Pilih Model Pencarian</strong></label
            >
            <div class="model-options">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="model"
                  id="sbert"
                  value="sbert"
                  checked
                />
                <label class="form-check-label" for="sbert"
                  >SBERT (Pencarian Semantik)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="model"
                  id="tfidf"
                  value="tfidf"
                />
                <label class="form-check-label" for="tfidf"
                  >TF-IDF (Pencarian Kata Kunci)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="model"
                  id="exact"
                  value="exact"
                />
                <label class="form-check-label" for="exact"
                  >Exact Words (Pencocokan Teks Persis)</label
                >
              </div>
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg btn-submit">
              Cari Buku
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
